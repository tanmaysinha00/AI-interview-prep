[build]
builder = "nixpacks"
buildCommand = "./mvnw clean package -DskipTests -B"

[deploy]
startCommand = "java -Dserver.port=$PORT -Dspring.profiles.active=prod -Xmx256m -Xms64m -XX:MaxMetaspaceSize=128m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -jar target/app.jar"
healthcheckPath = "/actuator/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
