# ============================================================
# Test profile — Testcontainers manages PostgreSQL + Redis URLs
# ============================================================

# Flyway disabled — tests use @Sql scripts for schema setup
spring.flyway.enabled=false

# JPA — create-drop for test schema
spring.jpa.hibernate.ddl-auto=create-drop

# Testcontainers auto-configures datasource when using @ServiceConnection
# but these placeholders prevent startup errors on properties binding
spring.datasource.url=jdbc:tc:postgresql:16-alpine:///interviewprep_test
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

# Mock Claude API — WireMock server started per test class
app.claude.base-url=http://localhost:${wiremock.port:8089}
app.claude.api-key=test-key

# JWT — fixed test secret
app.jwt.secret=test-secret-key-at-least-256-bits-long-for-hs256-tests-only

# Redis — Testcontainers Redis (set per-test via @DynamicPropertySource)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Logging
logging.level.com.interviewprep=DEBUG
logging.level.org.springframework.security=DEBUG

# CORS — allow all in tests
app.cors.allowed-origins=http://localhost:5173

# Sentry — disabled in tests
sentry.enabled=false
