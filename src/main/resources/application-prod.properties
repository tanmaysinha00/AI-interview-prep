# ============================================================
# Prod profile — Railway deployment
# All sensitive values come from Railway environment variables.
# No secrets are stored in this file.
# ============================================================

# PostgreSQL — parsed from DATABASE_URL by DatabaseUrlProcessor (EnvironmentPostProcessor)
# url/username/password are injected programmatically before HikariCP starts
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Redis — Railway provides REDIS_URL in redis:// format
spring.data.redis.url=${REDIS_URL}

# Logging
logging.level.com.interviewprep=INFO
logging.level.org.springframework=WARN

# CORS — set CORS_ALLOWED_ORIGINS to your GitHub Pages URL in Railway
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Secrets from Railway environment variables
app.jwt.secret=${JWT_SECRET}
app.claude.api-key=${CLAUDE_API_KEY}

# Railway terminates SSL at the edge — trust forwarded headers
server.forward-headers-strategy=native

# Sentry (optional — leave SENTRY_DSN unset to disable)
sentry.dsn=${SENTRY_DSN:}
sentry.environment=production
sentry.traces-sample-rate=0.2

# Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=when-authorized
