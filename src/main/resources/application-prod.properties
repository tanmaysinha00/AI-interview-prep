# ============================================================
# Prod profile — Railway deployment
# All sensitive values come from Railway environment variables.
# No secrets are stored in this file.
# ============================================================

# PostgreSQL — url/username/password/driver injected by DatabaseUrlProcessor from DATABASE_URL
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Redis — url injected by DatabaseUrlProcessor from REDIS_URL env var

# Logging
logging.level.com.interviewprep=INFO
logging.level.org.springframework=WARN

# CORS — set CORS_ALLOWED_ORIGINS in Railway to your GitHub Pages URL
# Falls back to localhost so the app starts even if the var is missing; MUST be
# set correctly in Railway for the frontend to be able to reach the API.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Secrets from Railway environment variables
app.jwt.secret=${JWT_SECRET}
app.claude.api-key=${CLAUDE_API_KEY}

# Railway terminates SSL at the edge — trust forwarded headers
server.forward-headers-strategy=native

# Sentry (optional — leave SENTRY_DSN unset to disable)
sentry.dsn=${SENTRY_DSN:}
sentry.environment=production
sentry.traces-sample-rate=0.2

# Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=when-authorized
