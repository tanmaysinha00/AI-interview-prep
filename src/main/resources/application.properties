# ============================================================
# Shared defaults (all profiles inherit these)
# ============================================================

server.port=8080
spring.application.name=interview-prep

# JPA — never use ddl-auto=update in prod; Flyway owns the schema
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus,info
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=${spring.application.name}

# SpringDoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Structured JSON logging
logging.pattern.console=

# Redis
spring.data.redis.timeout=2000ms

# JWT — values must be overridden via env vars in each profile
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# Claude API
app.claude.model=claude-sonnet-4-20250514
app.claude.base-url=https://api.anthropic.com
app.claude.max-tokens=4096
app.claude.timeout-seconds=30
app.claude.per-interview-token-budget=50000

# Rate limiting
app.rate-limit.interviews-per-hour=5
app.rate-limit.api-calls-per-day=100
app.rate-limit.login-per-minute=5
app.rate-limit.register-per-minute=3

# Resilience4j — ClaudeApiClient circuit breaker
resilience4j.circuitbreaker.instances.claudeApi.slidingWindowSize=10
resilience4j.circuitbreaker.instances.claudeApi.failureRateThreshold=50
resilience4j.circuitbreaker.instances.claudeApi.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.claudeApi.permittedNumberOfCallsInHalfOpenState=3
resilience4j.retry.instances.claudeApi.maxAttempts=3
resilience4j.retry.instances.claudeApi.waitDuration=1s
resilience4j.retry.instances.claudeApi.enableExponentialBackoff=true
resilience4j.retry.instances.claudeApi.exponentialBackoffMultiplier=2

# OAuth2 — stub values prevent auto-config failure when not configured
# Override GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET env vars in prod
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:stub-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:stub-client-secret}

# HikariCP connection pool (tuned for Heroku)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
